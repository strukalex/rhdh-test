
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5 # v4.2.1
        with:
          tags: ${{ github.sha }}
          tag_fallback: main
          build_context: ./

  deploy:
    name: Deploy
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Deploy to OpenShift
        env:
          OC_TOKEN: ${{ secrets.OC_TOKEN }}
          OC_SERVER: https://api.silver.devops.gov.bc.ca:6443
          OC_NAMESPACE: fd34fb-prod
          IMAGE_TAG: ${{ github.sha }}
        run: |
          oc login --token=${OC_TOKEN} --server=${OC_SERVER}
          oc apply -f openshift/ -n ${OC_NAMESPACE}
          oc set image deployment/test \
            test=ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG} \
            -n ${OC_NAMESPACE}
          oc rollout status deployment/test \
            -n ${OC_NAMESPACE} --timeout=120s

